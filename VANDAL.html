<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>CHECKOUT</title>

<style>

body{
margin:0;
background:#090909;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#161616;
padding:40px;
border-radius:20px;
width:400px;
}

input,select{
width:100%;
padding:12px;
margin-top:15px;
background:#222;
border:none;
color:white;
border-radius:10px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:red;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h1>CHECKOUT</h1>

<input type="text" placeholder="First Name">

<input type="text" placeholder="Last Name">

<input type="email" placeholder="Email">

<input type="text" placeholder="Address">

<select id="delivery">

<option value="8500">
Lagos Island (₦8,500)
</option>

<option value="6000">
Lagos Mainland (₦6,000)
</option>

<option value="12000">
Outside Lagos (₦12,000)
</option>

<option value="0">
Pick Up At Kudoro Estate (FREE)
</option>

</select>

<h2 id="total"></h2>

<button onclick="payNow()">
PAY NOW
</button>

</div>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let subtotal = 0;

cart.forEach(item=>{
subtotal += item.price;
});

const delivery =
document.getElementById("delivery");

function updateTotal(){

const deliveryFee =
Number(delivery.value);

document.getElementById("total").innerText =
"TOTAL: ₦" + (subtotal + deliveryFee);

}

delivery.addEventListener(
"change",
updateTotal
);

updateTotal();

function payNow(){

alert(
"Connect Paystack or Flutterwave here."
);

}

</script>

</body>
</html>
