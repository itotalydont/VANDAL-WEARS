<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>CHECKOUT</title>

<script src="https://checkout.flutterwave.com/v3.js"></script>

<style>

body{
margin:0;
background:#090909;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#161616;
padding:40px;
border-radius:20px;
width:400px;
}

input,select{
width:100%;
padding:12px;
margin-top:15px;
background:#222;
border:none;
color:white;
border-radius:10px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:red;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h1>CHECKOUT</h1>

<input type="text" id="firstName" placeholder="First Name">

<input type="text" id="lastName" placeholder="Last Name">

<input type="email" id="email" placeholder="Email">

<input type="text" id="phone" placeholder="Phone Number">

<input type="text" id="address" placeholder="Address">

<select id="delivery">

<option value="8500">
Lagos Island (₦8,500)
</option>

<option value="6000">
Lagos Mainland (₦6,000)
</option>

<option value="0">
Pick Up At Kudoro Estate (FREE)
</option>

<option value="outside">
Outside Lagos (Message Us Directly)
</option>

</select>

<h2 id="total"></h2>

<button id="payBtn" onclick="payNow()">
PAY NOW
</button>

</div>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let subtotal = 0;

cart.forEach(item=>{
subtotal += item.price;
});

const delivery =
document.getElementById("delivery");

function updateTotal(){

const payBtn = document.getElementById("payBtn");

if(delivery.value === "outside"){

document.getElementById("total").innerText =
"Outside Lagos? Message us directly to arrange delivery.";

payBtn.innerText = "MESSAGE US";

return;

}

payBtn.innerText = "PAY NOW";

const deliveryFee =
Number(delivery.value);

document.getElementById("total").innerText =
"TOTAL: ₦" + (subtotal + deliveryFee).toLocaleString("en-NG");

}

delivery.addEventListener(
"change",
updateTotal
);

updateTotal();

function payNow(){

if(cart.length === 0){
alert("Your cart is empty.");
return;
}

if(delivery.value === "outside"){

alert("Thanks! Since you're outside Lagos, please message us directly to arrange delivery and payment.");

window.location.href = "contact.html";

return;

}

const firstName = document.getElementById("firstName").value.trim();
const lastName = document.getElementById("lastName").value.trim();
const email = document.getElementById("email").value.trim();
const phone = document.getElementById("phone").value.trim();
const address = document.getElementById("address").value.trim();

if(!firstName || !lastName || !email || !phone || !address){
alert("Please fill in all fields before paying.");
return;
}

const deliveryFee = Number(delivery.value);
const total = subtotal + deliveryFee;

FlutterwaveCheckout({

public_key: "FLWPUBK_TEST-xxxxxxxxxxxxxxxxxxxxxxx-X",

tx_ref: "vandal-" + Date.now(),

amount: total,

currency: "NGN",

payment_options: "card, banktransfer, ussd",

customer:{
email: email,
phone_number: phone,
name: firstName + " " + lastName
},

meta:{
address: address,
delivery_option: delivery.options[delivery.selectedIndex].text,
cart: JSON.stringify(cart)
},

customizations:{
title: "VANDAL",
description: "Payment for items in cart",
logo: "VANDAL LOGO.png"
},

callback: function(response){

if(response.status === "successful"){

alert("Payment successful! Reference: " + response.transaction_id);

localStorage.removeItem("cart");

window.location.href = "index.html";

}else{

alert("Payment was not completed. Please try again.");

}

},

onclose: function(){
// user closed the payment modal without completing payment
}

});

}

</script>

</body>
</html>
